<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Restaurant Order System</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Our Menu</h1>
            <p class="subtitle" id="tableInfo">Loading table info...</p>
        </header>

        <div class="menu-container">
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="appetizer">Appetizers</button>
                <button class="filter-btn" data-category="main">Main Courses</button>
                <button class="filter-btn" data-category="dessert">Desserts</button>
                <button class="filter-btn" data-category="beverage">Beverages</button>
            </div>

            <div id="menuItems" class="menu-grid">
                <p class="loading">Loading menu...</p>
            </div>
        </div>

        <div class="cart-button-container">
            <button id="viewCartBtn" class="btn btn-primary">
                🛒 View Cart (<span id="cartCount">0</span>)
            </button>
        </div>

        <!-- Cart Modal -->
        <div id="cartModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Your Cart</h2>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <div id="cartItems"></div>
                    <div class="cart-total">
                        <strong>Total: <span id="cartTotal">0</span> kr</strong>
                    </div>
                    <div class="form-group">
                        <label for="orderNotes">Special Instructions (Optional):</label>
                        <textarea id="orderNotes" rows="3" placeholder="Any special requests?"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="clearCartBtn" class="btn btn-secondary">Clear Cart</button>
                    <button id="placeOrderBtn" class="btn btn-primary">Place Order</button>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2024 Restaurant Order System</p>
        </footer>
    </div>

    <script src="/js/menu.js"></script>
</body>
</html>
